#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
#

image:
  # -- image repository
  repository: ghcr.io/bitmagnet-io/bitmagnet
  # -- image tag
  tag:
  # -- image pull policy
  pullPolicy: IfNotPresent

command:
  - worker
  - run
args:
  - --keys=http_server
  - --keys=queue_server
  # disable the next line to run without DHT crawler
  - --keys=dht_crawler

# -- environment variables. See more environment variables in the [bitmagnet documentation](https://bitmagnet.org/docs).
# @default -- See below
env:
  # -- Set the container timezone
  TZ: UTC

# -- bitmagnet specific configuration keys.
# @default -- See https://bitmagnet.io/setup/configuration.html
config:
  # TMDB_API_KEY:

# -- Configures service settings for the chart.
# @default -- See values.yaml
service:
  main:
    ports:
      http:
        port: 3333
  bittorrent-tcp:
    enabled: false
    ports:
      bittorrent-tcp:
        enabled: true
        port: 3334
    externalTrafficPolicy: Local
  bittorrent-udp:
    enabled: false
    ports:
      bittorrent-udp:
        enabled: true
        port: 3334
        protocol: UDP
    externalTrafficPolicy: Local

ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See values.yaml
  main:
    enabled: false

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  config:
    enabled: false
    mountPath: /root/.config/bitmagnet

# -- Enable and configure postgresql database subchart under this key.
#    For more options see [postgresql chart documentation](https://github.com/CloudPirates-io/helm-charts/tree/main/charts/postgres)
# @default -- See values.yaml
postgresql:
  enabled: false
  replication:
    enabled: false
  auth:
    database: bitmagnet
    username: bitmagnet
    password: changeme
  persistence:
    enabled: true
    size: 4Gi
